<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Audiomack — Design Shots</title>
<style>
  :root {
    --bg: #fbfbfa;
    --surface: #ffffff;
    --border: #e6e4e0;
    --text: #1a1917;
    --muted: #6b6862;
    --accent: #3b5bdb;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #16151a;
      --surface: #1e1d23;
      --border: #33313a;
      --text: #ebe9e4;
      --muted: #9a968e;
      --accent: #8da2fb;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 3rem 1.5rem 5rem;
    background: var(--bg);
    color: var(--text);
    font: 16px/1.6 ui-sans-serif, -apple-system, "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  .back {
    display: inline-block;
    margin-bottom: 2rem;
    color: var(--muted);
    text-decoration: none;
    font-size: .9rem;
  }
  .back:hover { color: var(--accent); }
  header { margin-bottom: 3rem; }
  h1 {
    margin: 0 0 .4rem;
    font-size: 1.9rem;
    letter-spacing: -0.02em;
  }
  .sub { margin: 0; color: var(--muted); }
  .shots {
    list-style: none;
    margin: 0;
    padding: 0;
    display: grid;
    gap: .75rem;
  }
  .shot a {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 1rem;
    padding: 1.1rem 1.25rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    text-decoration: none;
    color: inherit;
    transition: border-color .15s ease, transform .15s ease;
  }
  .shot a:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  .shot .name { font-weight: 600; }
  .shot .date {
    color: var(--muted);
    font-size: .85rem;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  footer {
    margin-top: 3.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: .85rem;
  }
  code {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: .85em;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: .1em .4em;
  }
</style>
</head>
<body>
<div class="wrap">

  <a class="back" href="../">← All projects</a>

  <header>
    <h1>Audiomack — Design Shots</h1>
    <p class="sub">Work in progress — previews below. Nothing here is final.</p>
  </header>

  <ul class="shots">
    <li class="shot">
      <a href="shots/sample-shot.html">
        <span class="name">Sample Shot — layout test</span>
        <span class="date">2026-07-16</span>
      </a>
    </li>
  </ul>

  <footer>
    Add a shot by dropping an HTML file in <code>shots/</code> and adding a row above.
  </footer>

</div>
</body>
</html>
